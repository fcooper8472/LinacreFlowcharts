name: render-mermaid

on:
  push:
    paths:
      - "*.mmd"
      - "*.mermaid"
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/Krypton

      - name: Install tools
        run: |
          npm install -g @mermaid-js/mermaid-cli
          npm install puppeteer
          sudo apt update
          sudo apt install -y chromium-browser poppler-utils ttf-mscorefonts-installer fonts-liberation fonts-dejavu

      - run: mkdir artifacts

      - name: Render diagrams
        run: |
          for f in *.mmd; do
            base=$(basename "$f" | sed 's/\.[^.]*$//')

            mmdc -p puppeteer-config.json -i "$f" -o "artifacts/$base.svg"
            mmdc -p puppeteer-config.json -i "$f" -o "artifacts/$base.png"

            node render-pdf.js "artifacts/$base.svg" "artifacts/$base.pdf"

            pdftocairo -svg artifacts/$base.pdf artifacts/$base.clean.svg
          done

      - uses: actions/upload-artifact@v7
        with:
          name: mermaid-diagrams
          path: artifacts
