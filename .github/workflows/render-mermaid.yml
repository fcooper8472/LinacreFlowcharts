name: render-mermaid

on:
  push:
    paths:
      - "*.mmd"
      - "*.mermaid"
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/Krypton

      - run: npm install -g @mermaid-js/mermaid-cli

      - run: sudo apt-get update && sudo apt-get install -y chromium-browser

      - run: mkdir artifacts

      - name: Render diagrams
        run: |
          for f in *.mmd; do
            base=$(basename "$f" | sed 's/\.[^.]*$//')

            mmdc -p puppeteer-config.json -i "$f" -o "artifacts/$base.svg"
            mmdc -p puppeteer-config.json -i "$f" -o "artifacts/$base.png"

            # Use Chromium to print the SVG to a vector PDF (Chromium understands foreignObject)
            /usr/bin/chromium-browser --headless --no-sandbox --disable-gpu --print-to-pdf="artifacts/${base}.pdf" "file://$(pwd)/artifacts/${base}.svg"
          done

      - uses: actions/upload-artifact@v7
        with:
          name: mermaid-diagrams
          path: artifacts
